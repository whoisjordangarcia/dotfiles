add_newline = true
command_timeout = 1500
format = "${custom.prompt_info}$terraform$git_status$git_metrics$character"

[custom.prompt_info]
when = true
command = '~/.config/starship/prompt_info.sh'
shell = ["bash", "--noprofile", "--norc"]
format = "[$output]($style)"
style = "bold cyan"
description = "Shows repo/worktree name and conditional branch"

[terraform]
format = '[$symbol$workspace ]($style)'
symbol = "🌎 "
style = "bold magenta"
detect_extensions = ["tf", "tfvars", "tfplan"]
detect_folders = [".terraform"]

[character]
error_symbol = " [✗](bold cyan)"
success_symbol = " [❯](bold cyan)"

[git_status]
# Only the ahead/behind-remote indicator — no file symbols (kept simple).
# ⇡ green = local commits not pushed; ⇣ red = remote commits not pulled.
format = '[$ahead_behind]($style)'
style = "green"
ahead = "[ ⇡${count}](green)"
behind = "[ ⇣${count}](red)"
diverged = "[ ⇡${ahead_count}⇣${behind_count}](yellow)"
up_to_date = ""

[git_metrics]
# Lines changed in tracked files: green +added, red -deleted (git diff --shortstat).
disabled = false
added_style = "bold green"
deleted_style = "bold red"
# (...) groups vanish when their variable is empty, so a clean tree shows nothing
# (no dangling " · + -") and a one-sided diff shows just "+N" or "-N".
format = '([ · ](bright-black)[+$added]($added_style))([ -$deleted]($deleted_style))'
only_nonzero_diffs = true

