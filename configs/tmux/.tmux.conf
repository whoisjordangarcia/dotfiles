# Change prefix key to Ctrl+a
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# set true color - optimized for Ghostty
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:overline"
set -as terminal-features ",ghostty*:hyperlinks"
# Synchronized output (DECSET 2026) passthrough. Scoped to xterm-256color so it applies
# over SSH too (Ghostty-over-SSH reports `xterm-256color`, not `ghostty`). Sync gives
# atomic frame swaps → fixes TUI double-rendering (nvim, Claude Code, etc.).
# CAVEAT: Terminus/Tabby also report `xterm-256color` and mishandle the sync wrapper on
# tmux's status-line redraw (statusline double-renders). If you go back to those, revert
# this to `,ghostty*:sync` and send `TERM=ghostty` over SSH instead.
set -as terminal-features ",xterm-256color:sync"
# Allow OSC escape sequences to pass through tmux to the outer terminal (Ghostty)
set -g allow-passthrough on
# Enable focus events for better integration
set -g focus-events on
# Update terminal title to show session and window (Ghostty only — other terminals
# may render \e]2;...\a sequences as visible text in the scroll buffer)
set -g set-titles off

# Pass SSH env vars into tmux sessions (for IP display in statusline)
set -g update-environment "SSH_CONNECTION SSH_CLIENT SSH_TTY"

# turn on mouse support
set -g mouse on

# Reload config (prefix + r)
bind -N "Reload tmux config" r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Automatically rename tab based on running command and path
# Manual renames (prefix + ,) disable automatic-rename per-window, preserving your name
set-option -g automatic-rename on
set-option -g automatic-rename-format '#(~/.tmux/scripts/smart_window_name.sh "#{pane_current_path}" "#{pane_current_command}" "#{pane_pid}")'
set-option -g allow-rename off

# automatically open same directory when opening new window
bind-key % split-window -h -c "#{pane_current_path}"
bind-key "'" split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like window navigation
bind h previous-window
bind l next-window
bind H swap-window -t -1\; select-window -t -1
bind L swap-window -t +1\; select-window -t +1

# vim-tmux-navigator, inlined WITHOUT the plugin (its README's manual snippet):
# the plugin also grabs C-\ prefix-free ("previous pane"), which silently eats
# zmx's hardcoded detach key before it reaches ssh / nested sessions — breaking
# ctrl+\ session switching with the zma picker (zshrc .zshrc.functions).
# Only C-h/j/k/l are bound; C-\ is deliberately left free. Inlining (instead of
# plugin + unbind) avoids the race where tpm's async run-shell re-binds C-\
# after a later unbind line has already run.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# vim-tmux-navigator configuration - fix for Ghostty double input
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_save_on_switch 1
set -g @vim_navigator_disable_when_zoomed 1

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dev/dotfiles'

set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g renumber-windows on
set -g escape-time 0
set -g set-clipboard on
setw -g mode-key vi
#bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Manual session save/restore keybindings (safety net)
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

#Run plugin manager
run '~/.tmux/plugins/tpm/tpm'

# IMPORTANT: Settings after plugin load to override plugin defaults
set -g repeat-time 0

# Safety net for servers that loaded the vim-tmux-navigator plugin before it
# was inlined above: drop its C-\ grab on config reload (no-op on fresh starts).
unbind-key -n 'C-\'

# Status bar at the bottom (hook ensures plugins like floax can't permanently disable it)
set -g status on
set -g status-position bottom
set-hook -g session-created 'set -g status on'

# Auto-hide pane border titles when only 1 pane in the window
set-hook -g after-split-window  'if-shell "[ #{window_panes} -gt 1 ]" "set pane-border-status top" "set pane-border-status off"'
set-hook -g after-kill-pane     'if-shell "[ #{window_panes} -gt 1 ]" "set pane-border-status top" "set pane-border-status off"'
set-hook -g pane-exited         'if-shell "[ #{window_panes} -gt 1 ]" "set pane-border-status top" "set pane-border-status off"'

# Dev layout: lazygit (top-left 60%) / terminal (bottom-left) | claude (right 40%)
bind D split-window -h -l 40% -c "#{pane_current_path}" \;\
  select-pane -t 1 \;\
  split-window -v -l 30% -c "#{pane_current_path}" \;\
  send-keys -t 1 'lazygit' Enter \;\
  send-keys -t 3 'claude' Enter \;\
  select-pane -t 2 \;\
  send-keys 'clear' Enter

# Quick layout: claude (left) | lazygit (right)
bind g split-window -h -l 50% -c "#{pane_current_path}" \;\
  send-keys 'claude' Enter \;\
  send-keys -t 2 'lazygit' Enter \;\
  select-pane -t 1

# Open GitHub PR for current branch in browser (prefix + P)
bind -N "Open GitHub PR for current branch" P run-shell '~/.tmux/scripts/open_pr.sh "#{pane_current_path}"'

# Open Linear ticket for current branch in browser (prefix + T)
# Parses ticket ID from branch name, e.g. jordan/NES-1234-desc → linear.app/.../NES-1234
bind -N "Open Linear ticket from branch name" T run-shell '~/.tmux/scripts/open_linear.sh "#{pane_current_path}"'

# Worktree dev server dashboard - shows listening ports for current git worktree (prefix + W)
bind -N "Worktree dev server dashboard" W display-popup -E -w 60% -h 60% '~/.tmux/scripts/dev_dashboard.sh "#{pane_current_path}"'

# Daily note popup - open today's Obsidian note in a floating editor (prefix + J)
bind -N "Open today's daily note (journal)" J display-popup -E -w 70% -h 80% '~/.tmux/scripts/daily_note.sh'

# Dynamic pane borders - color by running command / window name
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=#{?#{m:nx*,#{window_name}},colour208,#{?#{m:[0-9]*,#{pane_current_command}},colour45,#{?#{m:*claude*,#{pane_current_command}},colour45,#{?#{m:*nvim*,#{pane_current_command}},colour40,colour114}}}}'

# Pane titles with gradient effect by command type (hidden when single pane, shown via hooks)
set -g pane-border-status off
set -g pane-border-format '#(~/.tmux/scripts/pane_title.sh "#{pane_active}" "#{pane_current_command}" "#{b:pane_current_path}")'

# --- Custom statusline (elegant minimal design) ---
set -g status-interval 10
set -g status-left-length 80
set -g status-right-length 180

# Base status style - transparent background
set -g status-style 'bg=default,fg=colour250'
set -g status-left-style 'bg=default'
set -g status-right-style 'bg=default'

# Left side: Claude state dot (amber ● waiting / green ● churning / dim ○ idle),
# then session identifier with nx/Claude detection
# Orange when nx is running, purple for Claude, subtle gray otherwise
set -g status-left "#(~/.tmux/scripts/claude_status.sh '#{session_id}')#{?client_prefix,#[fg=colour204 bold],#[fg=#{?#{m:nx*,#{window_name}},colour208,#{?#{m:[0-9]*,#{pane_current_command}},colour141,#{?#{m:*claude*,#{pane_current_command}},colour141,colour245}}} bold]}󰘧 #S #[fg=colour238]│#[default] "

# Window tabs - clean style
# Active: orange for nx, cyan for Claude, soft green otherwise
set -g window-status-current-format '#[fg=colour232,bg=#{?#{m:nx*,#{window_name}},colour208,#{?#{m:[0-9]*,#{pane_current_command}},colour117,#{?#{m:*claude*,#{pane_current_command}},colour117,colour114}}},bold] #I:#W#{?window_zoomed_flag, 󰊓,} #[default]'
set -g window-status-format '#[fg=colour244] #I:#W#{?window_zoomed_flag, 󰊓,} #[default]'
set -g window-status-separator '#[fg=colour238]·#[default]'
set -g window-status-style 'bg=default'

# Right side: clock, SSH host detection, and local IP when in SSH session
# NOTE: continuum_save.sh MUST be in status-right — it's how continuum triggers auto-saves
set -g status-right "#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#{?#{==:#{pane_current_command},ssh},#[fg=colour209]󰣀 #(~/.tmux/scripts/ssh_host.sh #{pane_pid})#[fg=colour238] │ ,}#{?SSH_CONNECTION,#[fg=colour209]● #(~/.tmux/scripts/ip_address.sh)#[fg=colour238] │ ,}#[fg=colour117]%H:%M #[default]"
