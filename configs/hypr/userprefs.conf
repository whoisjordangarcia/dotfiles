# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# Persistent virtual primary display. Retry a few times — creating it too early
# (before the compositor is ready) can silently fail and leave the session with
# zero outputs. sunshine.service's ExecStartPre is the belt-and-suspenders.
exec-once = bash -c 'for i in 1 2 3 4 5; do hyprctl output create headless MAIN && break; sleep 1; done'
# Launch Sunshine via its systemd --user unit, AFTER the compositor is up.
# The unit's WantedBy targets (display-manager/graphical-session/xdg-autostart)
# never activate in this Hyprland session, so systemd won't auto-start it on its
# own — Hyprland has to trigger it. Using `restart` (not a raw `sunshine` call)
# guarantees ONE systemd-managed instance that re-probes the encoder now that
# MAIN exists. This replaces the old `exec-once = sleep 1 && sunshine`, which
# raced the systemd unit for the ports and sometimes left the host dead.
exec-once = systemctl --user restart sunshine
exec-once = sleep 2 && liquidctl --pick 1 initialize
exec-once = sleep 3 && liquidctl --pick 1 set "sync" speed 50 
#exec-once = sleep 4 && hyde-shell waybar
# --- Portal Configuration for File Chooser / Steam ---

# 1. Start the wlr-specific backend
# This is crucial for Hyprland's Wayland file dialogs.
exec-once = /usr/lib/xdg-desktop-portal-wlr &

# 2. Start the core portal service
# Note: You might need a small delay here if the core service fails to start
# cleanly or picks the wrong backend too soon, but this usually works.
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal & 

bind = $mainMod SHIFT, F1, exec, $HOME/.config/sunshine/scripts/screenON.sh
bind = $mainMod SHIFT, F2, exec, $HOME/.config/sunshine/scripts/screenOFF.sh
bind = $mainMod SHIFT, F3, exec, $HOME/.config/sunshine/scripts/headless_screenOFF.sh

# for obs
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_DESKTOP_PORTAL,gtk 
env = XDG_DESKTOP_PORTAL,hyprland 

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    #follow_mouse = 2 
    sensitivity = 0.2
    force_no_accel = 0
    accel_profile = flat 

    # 🔗 See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }
    
}

# device {
#     name = mouse-passthrough 
#     enabled = false
# }

# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}


# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    gaps_in = 5
    gaps_out = 10

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 12

    # Fix washed-out appearance: make focused windows fully opaque
    active_opacity = 1.0
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
