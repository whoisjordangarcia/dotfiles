# MPD for rmpc — library is the NAS SMB share mounted by the rmpc() wrapper
# in .zshrc.functions (share URL lives in ~/.zshrc-modules/.zshrc.sec).
music_directory    "/Volumes/tank01/Music-clean"
db_file            "~/.config/mpd/database"
state_file         "~/.config/mpd/state"
playlist_directory "~/.config/mpd/playlists"
auto_update        "yes"
bind_to_address    "127.0.0.1"
# NO `device` here — deliberately. Omitting it makes the osx plugin track
# kAudioHardwarePropertyDefaultOutputDevice, i.e. whatever macOS is currently
# using, and it re-targets a *running* stream: plug in headphones or connect
# AirPods mid-song and playback migrates with no restart and no gap (verified on
# mpd 0.24 by switching the default device during playback and reading
# kAudioDevicePropertyDeviceIsRunningSomewhere).
#
# This is also what makes one config work on every Mac. A pinned device name is
# hardware-specific ("MacBook Pro Speakers" vs "Mac mini Speakers"), so a shared
# config pinning one of them leaves the other machine SILENT — and silent in the
# worst way: the cava FIFO below keeps consuming audio on its own, so the clock
# still advances and `mpc status` still reports [playing] while nothing comes
# out. If you ever re-add a pin, expect that failure on your other Mac.
#
# Cost of following the default: a dock/monitor/BlackHole/Zoom device can grab
# playback by becoming the system default. Fix that in Sound settings, or run
# `mpc disable CoreAudio && mpc enable CoreAudio` to re-open on the current one.
audio_output {
    type       "osx"
    name       "CoreAudio"
    mixer_type "software"  # osx plugin has no hardware mixer -> without this, setvol fails with "mixer not found"
}
# Raw PCM tap for rmpc's cava visualizer pane
audio_output {
    type   "fifo"
    name   "Visualizer FIFO (cava)"
    path   "~/.config/mpd/mpd.fifo"
    format "44100:16:2"
}
