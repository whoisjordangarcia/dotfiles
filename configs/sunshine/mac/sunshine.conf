address_family = both
origin_web_ui_allowed = lan
# setup.sh substitutes YOUR_LAN_IP with this host's LAN IP at install time, so
# no real address is committed. Required to avoid a 403 on the web UI from other
# machines (the CSRF origin check rejects an unlisted origin).
csrf_allowed_origins = https://YOUR_LAN_IP:47990,https://localhost:47990

key_rightalt_to_key_win = enabled
native_pen_touch = disabled
notify_pre_releases = enabled
upnp = disabled

min_log_level = info
# Apple Silicon hardware encoder. NOT nvenc — there is no NVIDIA GPU on a Mac.
encoder = videotoolbox
# No output_name pin: capture the current main display. Pinning to a specific
# display id breaks if that screen is removed — the stream then warps input to
# a nonexistent display.

keyboard = enabled
mouse = enabled
controller = enabled

fec_percentage = 20

resolutions = [1280x720, 1920x1080, 1920x1200, 2560x1440, 2560x1600, 2880x1800, 3024x1964, 3456x2234, 3840x2160]
fps = [30, 60, 90, 120]
