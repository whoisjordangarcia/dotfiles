  { app_id = "com.apple.ScreenSharing", workspace = 0 },  # Screen Sharing
  { app_id = "com.apple.screenshot.launcher", workspace = 0 },  # Screenshot
  { app_id = "com.apple.ScriptEditor2", workspace = 0 },  # Script Editor
  { app_id = "com.apple.shortcuts", workspace = 0 },  # Shortcuts
