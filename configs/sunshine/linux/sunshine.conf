address_family = both
origin_web_ui_allowed = lan
# Set these to this machine's LAN IP (kept local; never commit a real address).
csrf_allowed_origins = https://YOUR_LAN_IP:47990,https://localhost:47990
external_ip = YOUR_LAN_IP

gamepad = xone
key_rightalt_to_key_win = enabled
native_pen_touch = disabled
notify_pre_releases = enabled
upnp = disabled

min_log_level = info
# Boot-time encoder-probe target: the persistent headless "MAIN" created at
# Hyprland login (always present, even with the physical monitor off). Per-app
# "output" in apps.json overrides this during a stream (usually "MOONLIGHT").
output_name = MAIN
audio_sink = sink-sunshine-stereo
encoder = nvenc
# Tuned for a Wi-Fi client (Mac mini): squeeze more quality out of a limited,
# loss-prone bitrate rather than chasing raw resolution/bandwidth.
# preset 1->5: better quality per bit (the few ms of extra encode time is
#   irrelevant next to Wi-Fi network latency).
nvenc_preset = 5
# quarter_res two-pass: smarter bit allocation, minimal latency cost.
nvenc_twopass = quarter_res
nvenc_realtime_hags = enabled
nvenc_latency_over_power = enabled
# spatial AQ on: redistributes bits toward visually-important areas — the
# single biggest perceived-quality win at a constrained Wi-Fi bitrate.
nvenc_spatial_aq = enabled
nvenc_vbv_increase = 0

back_button_timeout = -1
keyboard = enabled
mouse = enabled
controller = enabled

fec_percentage = 20

resolutions = [1280x720, 1920x1080, 1920x1200, 2560x1440, 2560x1600, 2880x1800, 3024x1964, 3456x2234, 3840x2160]
fps = [30, 60, 90, 120]
