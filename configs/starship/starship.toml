add_newline = true
command_timeout = 500
format = "${custom.prompt_info}$git_status$character"

[custom.prompt_info]
when = true
command = '~/.config/starship/prompt_info.sh'
shell = ["bash", "--noprofile", "--norc"]
format = "[$output ]($style)"
style = "bold cyan"
description = "Shows repo/worktree name and conditional branch"

[character]
error_symbol = " [✗](bold cyan)"
success_symbol = " [❯](bold cyan)"

[git_status]
format = '[$all_status]($style)'
style = "cyan"
ahead = " ⇡${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
behind = " ⇣${count}"
conflicted = " "
up_to_date = ""
untracked = "?"
modified = " "
stashed = ""
staged = ""
renamed = ""
deleted = ""
