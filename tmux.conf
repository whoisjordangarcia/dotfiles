#===============================================================================
# .tmux.conf - Server-friendly tmux config
#===============================================================================

# General
set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
set -g pane-base-index 1

# Keys
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
bind | split-window -h
bind - split-window -v

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar
set -g status-bg black
set -g status-fg white
set -g status-left-length 40
set -g status-left "#[fg=green]#S #[fg=default]|"
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M:%S #[fg=default]"
set -g status-interval 1

# Window status
setw -g window-status-format " #I: #W "
setw -g window-status-current-format "#[fg=red,bold] #I: #W #[default]"

# Pane borders
set -g pane-border-style fg=blue
set -g pane-active-border-style fg=green

# Messages
set -g message-style bg=black,fg=white
set -g message-command-style bg=black,fg=white

# Titles
set -g set-titles on
set -g set-titles-string "#T"

# Auto-rename
setw -g automatic-rename on

# Don't rename windows automatically
setw -g allow-rename off

# Start windows at 1
set -g base-index 1
setw -g pane-base-index 1

# Reload
bind r source-file ~/.tmux.conf

# Quick pane swap
bind -r < swap-pane -U
bind -r > swap-pane -D

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
