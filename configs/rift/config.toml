# Modifier combinations (i3/sway style: Option as $mod)
[modifier_combinations]
comb1 = "Option + Shift"

[keys]
# i3/sway keybinds using Option as $mod
# Navigation: jkl; (i3 default)

# Focus movement (vim-style, matches cmux's cmd+opt+hjkl pane focus).
# In the scrolling layout, H/L is how you scroll along the column strip.
# (Option+J previously duplicated toggle_orientation — Option+E still does it.)
"Option + H" = { move_focus = "left" }
"Option + J" = { move_focus = "down" }
"Option + K" = { move_focus = "up" }
"Option + L" = { move_focus = "right" }

# Move the focused window within the layout (i3's $mod+Shift+hjkl)
"comb1 + H" = { move_node = "left" }
"comb1 + J" = { move_node = "down" }
"comb1 + K" = { move_node = "up" }
"comb1 + L" = { move_node = "right" }

# Workspaces (Option + 1-9,0)
"Option + 1" = { switch_to_workspace = 0 }
"Option + 2" = { switch_to_workspace = 1 }
"Option + 3" = { switch_to_workspace = 2 }
"Option + 4" = { switch_to_workspace = 3 }
"Option + 5" = { switch_to_workspace = 4 }
"Option + 6" = { switch_to_workspace = 5 }
"Option + 7" = { switch_to_workspace = 6 }
"Option + 8" = { switch_to_workspace = 7 }
"Option + 9" = { switch_to_workspace = 8 }
"Option + 0" = { switch_to_workspace = 9 }

# Move the focused window to workspace N AND follow it there.
# rift has no native move+switch action and no --follow flag, so we chain the two
# steps via `sh -c`. The `&&` runs them sequentially (switch waits for the move to
# finish), so only the focused window moves — then focus follows to the destination.
"comb1 + 1" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 0 && rift-cli execute workspace switch 0"] }
"comb1 + 2" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 1 && rift-cli execute workspace switch 1"] }
"comb1 + 3" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 2 && rift-cli execute workspace switch 2"] }
"comb1 + 4" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 3 && rift-cli execute workspace switch 3"] }
"comb1 + 5" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 4 && rift-cli execute workspace switch 4"] }
"comb1 + 6" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 5 && rift-cli execute workspace switch 5"] }
"comb1 + 7" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 6 && rift-cli execute workspace switch 6"] }
"comb1 + 8" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 7 && rift-cli execute workspace switch 7"] }
"comb1 + 9" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 8 && rift-cli execute workspace switch 8"] }
"comb1 + 0" = { exec = ["sh", "-c", "rift-cli execute workspace move-window 9 && rift-cli execute workspace switch 9"] }

# Move window to display by index (Ctrl + Cmd + N)
"Ctrl + Meta + 1" = { exec = ["rift-cli", "execute", "display", "move-window", "--index", "0"] }
"Ctrl + Meta + 2" = { exec = ["rift-cli", "execute", "display", "move-window", "--index", "1"] }

# Workspace back and forth
"Option + Tab" = "switch_to_last_workspace"

# Layout toggles (matching aerospace: s=stack, e=toggle orientation)
"Option + S" = "toggle_stack"
"Option + E" = "toggle_orientation"

# Switch the ACTIVE workspace's layout on the fly (rift 0.4.0+).
# Try the niri-style scrolling layout with Option+Shift+S; back with Option+Shift+T.
"Option + Shift + S" = { set_workspace_layout = { mode = "scrolling" } }
"Option + Shift + T" = { set_workspace_layout = { mode = "traditional" } }

# Fullscreen
"Option + F" = "toggle_fullscreen"
"Option + Shift + F" = "toggle_fullscreen_within_gaps"

# Floating
"Option + W" = "toggle_window_floating"
"Option + Shift + Space" = "toggle_window_floating"
"comb1 + Ctrl + Space" = "toggle_focus_floating"

# Join/stack windows (arrow keys)
"Option + Shift + Left" = { join_window = "left" }
"Option + Shift + Right" = { join_window = "right" }
"Option + Shift + Up" = { join_window = "up" }
"Option + Shift + Down" = { join_window = "down" }
"Option + Ctrl + E" = "unjoin_windows"

# Resize (no mode in rift, direct keybinds)
"Option + Shift + Equal" = "resize_window_grow"
"Option + Shift + Minus" = "resize_window_shrink"

# Toggle space activated
"Option + Z" = "toggle_space_activated"

# App launchers
"Option + O" = { exec = ["open", "-a", "Obsidian"] }
"Option + T" = { exec = ["open", "-a", "Ghostty"] }
"Option + Slash" = { exec = ["open", "-a", "1Password"] }

# System
# rift runs under brew services (homebrew.mxcl.rift), and hot_reload can't
# see symlinked-config edits (acsandmann/rift#377), so this restart bind is
# the reliable way to apply config changes. brew needs an absolute path:
# rift is spawned by launchd, whose minimal PATH lacks /opt/homebrew/bin.
"Option + Shift + R" = { exec = ["sh", "-c", "/opt/homebrew/bin/brew services restart rift"] }
"Option + Shift + D" = "debug"
"Option + Ctrl + S" = "serialize"
"Option + Ctrl + Q" = "save_and_exit"
